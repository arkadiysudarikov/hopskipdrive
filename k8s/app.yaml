apiVersion: apps/v1
kind: Deployment
metadata:
  name: hopskipdrive-web
  namespace: hopskipdrive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hopskipdrive-web
  template:
    metadata:
      labels:
        app: hopskipdrive-web
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: web
          image: 251222060072.dkr.ecr.us-west-2.amazonaws.com/hopskipdrive:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: RAILS_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: RUN_DB_PREPARE
              value: "true"
            - name: RUN_DB_SEED
              value: "true"
            - name: WEB_CONCURRENCY
              value: "1"
            - name: RAILS_MAX_THREADS
              value: "5"
            - name: RAILS_SERVE_STATIC_FILES
              value: "true"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hopskipdrive-secrets
                  key: DATABASE_URL
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hopskipdrive-secrets
                  key: GOOGLE_API_KEY
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: hopskipdrive-secrets
                  key: SECRET_KEY_BASE
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: hopskipdrive-secrets
                  key: CORS_ALLOWED_ORIGINS
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: hopskipdrive-web
  namespace: hopskipdrive
spec:
  selector:
    app: hopskipdrive-web
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hopskipdrive-web
  namespace: hopskipdrive
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /up
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hopskipdrive-web
                port:
                  number: 80
